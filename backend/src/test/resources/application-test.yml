server:
  port: 0  # Random port for tests

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/articleplatform_test
    username: article_user
    password: article_password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: create-drop  # Creates schema, drops after tests
    show-sql: false  # Quiet logs for tests
    properties:
      hibernate:
        format_sql: false

logging:
  level:
    com.mehdymokhtari.articleplatform: WARN
    org.springframework: WARN
    org.hibernate: WARN

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: 86400000